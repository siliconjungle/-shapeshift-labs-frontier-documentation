name: package-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run fuzz -- --cases 200
      - run: npm run bench
      - run: npm run pack:dry
